name: Frontend Demo

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-smoke:
    name: Build and smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: gem-lab/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix gem-lab

      - name: Build production app
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: gem-lab

      - name: Run smoke tests
        run: npm run test:smoke --prefix gem-lab
